<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Profile</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body onload="loadProfile()">
    <header>
      <img class="logo" src="../Logo.png" alt="FutureMe" />

      <nav>
        <a href="../Home/index.html">Trang chủ</a>
        <a href="../Dreams/index.html">Tạo ước mơ</a>
        <a href="../Diary/index.html">Nhật ký</a>
        <a href="../Progress/index.html">Tiến độ</a>
      </nav>

      <div class="profile" onclick="goProfile()">
        <img src="../Profile/profile.png" />
        <span id="username">User</span>
      </div>
    </header>

    <div class="container">
      <div class="profile-box">
        <img id="avatar" src="profile.png" class="profile-img" />

        <div class="info">
          <div class="row">
            <span>Username:</span>
            <span id="nameText">User</span>
            <button onclick="changeUsername()">Đổi</button>
          </div>

          <div class="row">
            <span>Password:</span>
            <span id="passText">****</span>
            <button onclick="changePassword()">Đổi</button>
          </div>

          <div class="row">
            <span>Email:</span>
            <span id="emailText">****</span>
            <button class="fix-margin"></button>
          </div>
        </div>
        <button class="Sign_out" onclick="logout()">Đăng xuất</button>
      </div>
    </div>

    <footer>
      <p>© 2026 FutureMe</p>
    </footer>

    <script type="module" src="script.js"></script>
  </body>
</html>
