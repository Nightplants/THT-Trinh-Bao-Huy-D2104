<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>FutureMe - Đăng ký</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 class="title">FutureMe</h1>

    <div class="login-box">
      <h2>Tạo tài khoản</h2>

      <input type="text" id="username" placeholder="Username" />

      <input type="email" id="email" placeholder="Email" />

      <div class="password-box">
        <input type="password" id="password" placeholder="Mật khẩu" />
        <span class="show-pass" onclick="togglePass('password')">👁</span>
      </div>

      <div class="password-box">
        <input
          type="password"
          id="confirmPassword"
          placeholder="Nhập lại mật khẩu"
        />
        <span class="show-pass" onclick="togglePass('confirmPassword')"
          >👁</span
        >
      </div>

      <button onclick="register()">Đăng ký</button>

      <p class="switch">
        Đã có tài khoản?
        <a href="../Sign_in/index.html">Đăng nhập</a>
      </p>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
