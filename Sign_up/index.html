<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>FutureMe - Tạo tài khoản</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1 class="title">FutureMe</h1>

    <div class="login-box">
      <h2>Tạo tài khoản</h2>

      <input type="email" id="email" placeholder="Email" />

      <div class="password-box">
        <input type="password" id="password" placeholder="Mật khẩu" />
        <span class="show-pass" onclick="togglePassword('password')">👁</span>
      </div>

      <div class="password-box">
        <input
          type="password"
          id="repassword"
          placeholder="Nhập lại mật khẩu"
        />
        <span class="show-pass" onclick="togglePassword('repassword')">👁</span>
      </div>

      <button onclick="register()">Tạo tài khoản</button>

      <p id="msg"></p>

      <div class="switch">
        Đã có tài khoản? <a href="../Sign_in/index.html">Đăng nhập</a>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
