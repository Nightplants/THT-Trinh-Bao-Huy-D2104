<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Nhật ký</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body
    onload="
      loadDiary();
      loadProfile();
      checkLetters();
    "
  >
    <header>
      <div class="logo">FutureMe</div>

      <nav>
        <a href="../Home/index.html">Trang chủ</a>
        <a href="../Dreams/index.html">Tạo ước mơ</a>
        <a href="../Diary/index.html">Nhật ký</a>
        <a href="../Progress/index.html">Tiến độ</a>
      </nav>

      <div class="profile" onclick="goProfile()">
        <img id="profile" src="../Profile/profile.png" />
        <span id="username">User</span>
      </div>
    </header>

    <h1>📔 Nhật ký của bạn</h1>

    <div class="container">
      <div class="box">
        <textarea
          id="diaryInput"
          placeholder="Hôm nay bạn nghĩ gì..."
        ></textarea>
        <button onclick="addDiary()">Lưu nhật ký</button>
      </div>

      <button onclick="toggleReminder()" class="toggle-btn">
        📩 Gửi thư cho tương lai
      </button>

      <div class="box" id="reminderBox" style="display: none">
        <h3>📩 Gửi thư cho tương lai</h3>

        <textarea
          id="reminderInput"
          placeholder="Viết điều muốn nhắn bản thân..."
        ></textarea>

        <input type="date" id="reminderTime" />

        <button onclick="addReminder()">Gửi thư</button>
      </div>

      <div id="diaryList"></div>
    </div>

    <div id="letterPopup" class="popup">
      <div class="popup-content">
        <h2>📬 Thư từ quá khứ</h2>

        <div id="letterList"></div>

        <button onclick="closePopup()">Đóng</button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
