<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>FutureMe - Đăng nhập</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 class="title">FutureMe</h1>

    <div class="login-box">
      <h2>Đăng nhập</h2>

      <input type="email" id="email" placeholder="Email" />
      <div class="password-box">
        <input type="password" id="password" placeholder="Mật khẩu" />
        <span onclick="togglePassword()" class="show-pass">👁</span>
      </div>

      <button onclick="login()">Đăng nhập</button>

      <p id="msg"></p>

      <p class="switch">
        Chưa có tài khoản?
        <a href="../Cre_acc/index.html">Tạo ngay</a>
      </p>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
