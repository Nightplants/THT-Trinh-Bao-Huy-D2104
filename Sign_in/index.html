<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>FutureMe - Đăng nhập</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 class="title">FutureMe</h1>

    <div class="login-box">
      <h2>Đăng nhập</h2>

      <input type="text" id="loginInput" placeholder="Email hoặc Username" />

      <div class="password-box">
        <input type="password" id="password" placeholder="Mật khẩu" />
        <span class="show-pass" onclick="togglePass('password')">👁</span>
      </div>

      <button onclick="login()">Đăng nhập</button>

      <p class="switch">
        Chưa có tài khoản?
        <a href="../Sign_up/index.html">Tạo tài khoản</a>
      </p>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
