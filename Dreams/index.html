<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Tạo ước mơ</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <div class="logo">FutureMe</div>

      <nav>
        <a href="../Home/index.html">Trang chủ</a>
        <a href="../Dreams/index.html">Tạo ước mơ</a>
        <a href="#">Nhật ký</a>
        <a href="#">Tiến độ</a>
      </nav>

      <div class="profile" onclick="goAvatar()">
        <img id="profile" src="../Profile/profile.png" />
        <span id="name">User</span>
      </div>
    </header>

    <section class="dream">
      <h1>Tạo ước mơ của bạn</h1>

      <p>Viết mục tiêu và ước mơ bạn muốn đạt được.</p>

      <input id="dreamName" type="text" placeholder="Tên ước mơ..." />

      <input id="dreamDeadline" type="date" />

      <input
        id="dreamSteps"
        type="text"
        placeholder="Các bước nhỏ (ví dụ: học HTML, CSS...)"
      />

      <button onclick="addDream()">Lưu</button>
    </section>

    <script src="script.js"></script>
  </body>
</html>
